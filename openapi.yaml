openapi: 3.1.0
info:
  title: Smart Campus AI Vision Contract
  version: 1.0.0
  description: |
    OpenAPI 3.1 contract cho cặp REST sync Camera Stream -> AI Vision.
    Camera Stream gửi frame_url để AI Vision detect đồng bộ và trả kết quả ngay.
  contact:
    name: FIT4110 Team 10
    email: fit4110-team10@example.edu.vn
servers:
  - url: http://localhost:4010/api/v1
    description: Prism mock server
  - url: https://api.campus.local/api/v1
    description: Class network placeholder

security:
  - bearerAuth: []

tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: vision
    description: Phân tích frame và detect
  - name: detections
    description: Tra cứu kết quả phát hiện
  - name: models
    description: Lấy thông tin model

paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: Endpoint kiểm tra AI Vision còn hoạt động.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: ai-vision
                    time: '2026-05-13T08:00:00Z'

  /vision/detect:
    post:
      operationId: createDetect
      summary: Phân tích frame từ Camera Stream
      description: |
        Camera Stream gửi frame_url khi phát hiện motion.
        AI Vision xử lý đồng bộ và trả về detection ngay trong response 200.
      tags: [vision]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectRequest'
            examples:
              urlFrame:
                value:
                  camera_id: CAM-001
                  correlation_id: 4c3b2b1a-7d5f-4f8b-9a62-8c8c1d0e6b01
                  timestamp: '2026-05-17T08:00:00Z'
                  frame_url: https://cdn.campus.local/frames/cam-001-0001.jpg
      responses:
        '200':
          description: Detection đã được tạo và trả về ngay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'
              examples:
                detected:
                  value:
                    detection_id: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    camera_id: CAM-001
                    correlation_id: 4c3b2b1a-7d5f-4f8b-9a62-8c8c1d0e6b01
                    anomaly_detected: true
                    risk_level: HIGH
                    confidence_score: 0.91
                    model_version: yolo-cam-1.0.0
                    objects:
                      - finding_type: PERSON
                        label: unauthorized_person
                        confidence: 0.87
                        person_id: SV001
                        bounding_box:
                          x: 120
                          y: 64
                          width: 48
                          height: 132
                      - finding_type: OBJECT
                        label: unattended_bag
                        confidence: 0.78
                        object_category: bag
                        bounding_box:
                          x: 308
                          y: 141
                          width: 75
                          height: 64
                    processed_at: '2026-05-17T08:00:01Z'
                    note: Phát hiện đồng thời người lạ và vật thể bất thường
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vision/detections/{detectionId}:
    get:
      operationId: getDetectionById
      summary: Lấy chi tiết detection theo ID
      description: Tra cứu một detection đã tạo bởi AI Vision.
      tags: [detections]
      parameters:
        - $ref: '#/components/parameters/DetectionId'
      responses:
        '200':
          description: Chi tiết detection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'
              examples:
                detected:
                  value:
                    detection_id: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    camera_id: CAM-001
                    correlation_id: 4c3b2b1a-7d5f-4f8b-9a62-8c8c1d0e6b01
                    anomaly_detected: true
                    risk_level: HIGH
                    confidence_score: 0.91
                    model_version: yolo-cam-1.0.0
                    objects:
                      - finding_type: PERSON
                        label: unauthorized_person
                        confidence: 0.87
                        person_id: SV001
                        bounding_box:
                          x: 120
                          y: 64
                          width: 48
                          height: 132
                    processed_at: '2026-05-17T08:00:01Z'
                    note: Phát hiện đồng thời người lạ và vật thể bất thường
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /vision/models/info:
    get:
      operationId: getModelInfo
      summary: Lấy thông tin model
      description: Trả về thông tin model AI Vision và các nhãn mà model hỗ trợ.
      tags: [models]
      responses:
        '200':
          description: Thông tin model hiện tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelInfo'
              examples:
                default:
                  value:
                    model_id: yolo-cam-1.0.0
                    version: 1.0.0
                    supported_labels:
                      - person
                      - bag
                      - vehicle
                    last_updated: '2026-05-17T00:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DetectionId:
      name: detectionId
      in: path
      required: true
      description: UUID của detection.
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Payload không hợp lệ hoặc sai format.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Thiếu hoặc sai bearer token.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource không tồn tại.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    UnprocessableEntity:
      description: Dữ liệu đúng JSON nhưng vi phạm rule nghiệp vụ.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalServerError:
      description: Lỗi không mong muốn ở provider.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
          description: Trạng thái service.
          example: ok
        service:
          type: string
          minLength: 2
          maxLength: 80
          description: Tên service.
          example: ai-vision
        time:
          type: string
          format: date-time
          description: Thời điểm kiểm tra.
          example: '2026-05-13T08:00:00Z'

    DetectRequest:
      type: object
      additionalProperties: false
      required: [camera_id, correlation_id, timestamp, frame_url]
      properties:
        camera_id:
          type: string
          minLength: 1
          maxLength: 40
          description: Mã camera gửi frame.
          example: CAM-001
        correlation_id:
          type: string
          format: uuid
          description: Mã correlation dùng để trace request.
        timestamp:
          type: string
          format: date-time
          description: Thời điểm camera gửi frame.
        frame_url:
          type: string
          format: uri
          description: URL nội bộ chứa frame cần phân tích.
        mime_type:
          type: [string, 'null']
          minLength: 3
          maxLength: 80
          description: Loại MIME của frame nếu Consumer muốn khai báo rõ.
        confidence_threshold:
          type: [number, 'null']
          minimum: 0
          maximum: 1
          description: Ngưỡng confidence tham chiếu cho nghiệp vụ camera.

    DetectionResult:
      type: object
      additionalProperties: false
      required:
        - detection_id
        - camera_id
        - correlation_id
        - anomaly_detected
        - objects
        - risk_level
        - confidence_score
        - processed_at
      properties:
        detection_id:
          type: string
          format: uuid
          description: UUID của detection.
        camera_id:
          type: string
          minLength: 1
          maxLength: 40
          description: Mã camera phát sinh frame.
        correlation_id:
          type: string
          format: uuid
          description: Mã correlation từ Consumer.
        anomaly_detected:
          type: boolean
          description: Cờ cho biết có anomaly hay không.
        risk_level:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
          description: Mức rủi ro nghiệp vụ.
        confidence_score:
          type: [number, 'null']
          minimum: 0
          maximum: 1
          description: Điểm tin cậy; null khi không có anomaly.
        model_version:
          type: [string, 'null']
          minLength: 1
          maxLength: 80
          description: Phiên bản model đã sinh ra kết quả.
        objects:
          type: array
          minItems: 0
          maxItems: 100
          description: Danh sách finding phát hiện trong frame.
          items:
            $ref: '#/components/schemas/Finding'
        processed_at:
          type: string
          format: date-time
          description: Thời điểm AI Vision hoàn tất xử lý.
        note:
          type: [string, 'null']
          minLength: 1
          maxLength: 500
          description: Ghi chú ngắn về kết quả.

    Finding:
      oneOf:
        - $ref: '#/components/schemas/PersonFinding'
        - $ref: '#/components/schemas/ObjectFinding'
      discriminator:
        propertyName: finding_type
        mapping:
          PERSON: '#/components/schemas/PersonFinding'
          OBJECT: '#/components/schemas/ObjectFinding'

    PersonFinding:
      type: object
      additionalProperties: false
      required: [finding_type, label, confidence]
      properties:
        finding_type:
          type: string
          const: PERSON
        label:
          type: string
          minLength: 1
          maxLength: 60
        confidence:
          type: number
          minimum: 0
          maximum: 1
        person_id:
          type: [string, 'null']
          minLength: 1
          maxLength: 40
        bounding_box:
          $ref: '#/components/schemas/BoundingBox'
        description:
          type: [string, 'null']
          minLength: 1
          maxLength: 200

    ObjectFinding:
      type: object
      additionalProperties: false
      required: [finding_type, label, confidence]
      properties:
        finding_type:
          type: string
          const: OBJECT
        label:
          type: string
          minLength: 1
          maxLength: 60
        confidence:
          type: number
          minimum: 0
          maximum: 1
        object_category:
          type: [string, 'null']
          minLength: 1
          maxLength: 40
        bounding_box:
          $ref: '#/components/schemas/BoundingBox'
        description:
          type: [string, 'null']
          minLength: 1
          maxLength: 200

    BoundingBox:
      type: object
      additionalProperties: false
      required: [x, y, width, height]
      properties:
        x:
          type: number
          minimum: 0
        y:
          type: number
          minimum: 0
        width:
          type: number
          minimum: 0
        height:
          type: number
          minimum: 0

    ModelInfo:
      type: object
      additionalProperties: false
      required: [model_id, version, supported_labels, last_updated]
      properties:
        model_id:
          type: string
          minLength: 1
          maxLength: 80
          description: Mã định danh model.
        version:
          type: string
          minLength: 1
          maxLength: 80
          description: Phiên bản model.
        supported_labels:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 60
          description: Các nhãn mà model hỗ trợ.
        last_updated:
          type: string
          format: date-time
          description: Thời điểm update model gần nhất.
        input_modes:
          type: array
          minItems: 1
          items:
            type: string
            enum: [URL, BASE64]
          description: Kiểu đầu vào mô hình có thể xử lý.

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: URI định danh loại lỗi.
          example: https://campus.local/errors/validation
        title:
          type: string
          minLength: 3
          maxLength: 120
          description: Tên lỗi ngắn.
          example: Validation failed
        status:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code.
          example: 422
        detail:
          type: [string, 'null']
          description: Mô tả chi tiết lỗi.
          example: frame_url is required when request is sent by URL
        instance:
          type: [string, 'null']
          format: uri
          description: URI của request bị lỗi.
        correlation_id:
          type: [string, 'null']
          format: uuid
          description: Mã correlation để truy vết lỗi.
        errors:
          type: array
          description: Danh sách trường lỗi nếu có.
          items:
            type: object
            additionalProperties: false
            required: [name, reason]
            properties:
              name:
                type: string
              reason:
                type: string
